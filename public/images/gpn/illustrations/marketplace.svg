<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Маркетплейс роботизации промышленности — сетка карточек">
  <rect width="1600" height="900" fill="#0E0E0E"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="225" x2="1600" y2="225"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="0" y1="675" x2="1600" y2="675"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
  </g>

  <!-- Header -->
  <text x="120" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
        font-size="14" letter-spacing="2.6" fill="#ffffff66">МАРКЕТПЛЕЙС РОБОТИЗАЦИИ ПРОМЫШЛЕННОСТИ</text>
  <text x="120" y="170" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="36" font-weight="600" fill="#ffffff">Каталог промышленных решений</text>

  <!-- Search bar -->
  <rect x="120" y="210" width="1360" height="56" rx="10" fill="#ffffff08" stroke="#ffffff14" stroke-width="1"/>
  <text x="148" y="245" font-family="-apple-system, sans-serif" font-size="16" fill="#ffffff44">Найти решение по операции, отрасли или производителю…</text>

  <!-- Cards 4×2 grid -->
  <g transform="translate(120, 308)">
    <!-- card 1: manipulator -->
    <g transform="translate(0, 0)">
      <rect width="320" height="240" rx="14" fill="#1A1A1A" stroke="#ffffff10" stroke-width="1"/>
      <rect x="20" y="20" width="280" height="120" rx="8" fill="#0a0a0a" stroke="#ffffff08"/>
      <!-- robot arm -->
      <g transform="translate(160, 85)" stroke="#A6FF00" stroke-width="2.4" fill="none" stroke-linecap="round">
        <circle cx="0" cy="30" r="6" fill="#A6FF00"/>
        <line x1="0" y1="30" x2="-26" y2="-8"/>
        <line x1="-26" y1="-8" x2="20" y2="-32"/>
        <rect x="14" y="-40" width="20" height="14" rx="2" fill="#A6FF00" stroke="none"/>
      </g>
      <text x="20" y="170" font-family="-apple-system, sans-serif" font-size="11" letter-spacing="1.5" fill="#ffffff55">МАНИПУЛЯТОРЫ</text>
      <text x="20" y="194" font-family="-apple-system, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Сборка узлов</text>
      <text x="20" y="218" font-family="-apple-system, sans-serif" font-size="13" fill="#A6FF00">от 1.4 млн ₽</text>
    </g>

    <!-- card 2: conveyor -->
    <g transform="translate(346, 0)">
      <rect width="320" height="240" rx="14" fill="#1A1A1A" stroke="#ffffff10" stroke-width="1"/>
      <rect x="20" y="20" width="280" height="120" rx="8" fill="#0a0a0a" stroke="#ffffff08"/>
      <g transform="translate(40, 70)" stroke="#A6FF00" stroke-width="2.4" fill="none" stroke-linecap="round">
        <circle cx="20" cy="30" r="14"/>
        <circle cx="220" cy="30" r="14"/>
        <line x1="20" y1="16" x2="220" y2="16"/>
        <line x1="20" y1="44" x2="220" y2="44"/>
        <rect x="80" y="-6" width="22" height="22" fill="#A6FF00" stroke="none"/>
        <rect x="130" y="-6" width="22" height="22" fill="#A6FF00" stroke="none" opacity="0.55"/>
      </g>
      <text x="20" y="170" font-family="-apple-system, sans-serif" font-size="11" letter-spacing="1.5" fill="#ffffff55">КОНВЕЙЕРЫ</text>
      <text x="20" y="194" font-family="-apple-system, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Логистика цеха</text>
      <text x="20" y="218" font-family="-apple-system, sans-serif" font-size="13" fill="#A6FF00">от 820 тыс. ₽</text>
    </g>

    <!-- card 3: AGV -->
    <g transform="translate(692, 0)">
      <rect width="320" height="240" rx="14" fill="#1A1A1A" stroke="#ffffff10" stroke-width="1"/>
      <rect x="20" y="20" width="280" height="120" rx="8" fill="#0a0a0a" stroke="#ffffff08"/>
      <g transform="translate(110, 60)" stroke="#A6FF00" stroke-width="2.4" fill="none" stroke-linecap="round">
        <rect x="0" y="0" width="100" height="46" rx="6"/>
        <circle cx="22" cy="56" r="10" fill="#A6FF00" stroke="none"/>
        <circle cx="78" cy="56" r="10" fill="#A6FF00" stroke="none"/>
        <line x1="20" y1="14" x2="80" y2="14" opacity="0.4"/>
        <line x1="20" y1="26" x2="60" y2="26" opacity="0.4"/>
      </g>
      <text x="20" y="170" font-family="-apple-system, sans-serif" font-size="11" letter-spacing="1.5" fill="#ffffff55">AGV / МОБИЛЬНЫЕ</text>
      <text x="20" y="194" font-family="-apple-system, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Транспортировка</text>
      <text x="20" y="218" font-family="-apple-system, sans-serif" font-size="13" fill="#A6FF00">от 2.1 млн ₽</text>
    </g>

    <!-- card 4: drone -->
    <g transform="translate(1038, 0)">
      <rect width="320" height="240" rx="14" fill="#1A1A1A" stroke="#ffffff10" stroke-width="1"/>
      <rect x="20" y="20" width="280" height="120" rx="8" fill="#0a0a0a" stroke="#ffffff08"/>
      <g transform="translate(160, 75)" stroke="#A6FF00" stroke-width="2.4" fill="none" stroke-linecap="round">
        <circle cx="0" cy="0" r="8" fill="#A6FF00" stroke="none"/>
        <line x1="-8" y1="-3" x2="-40" y2="-22"/>
        <line x1="8" y1="-3" x2="40" y2="-22"/>
        <line x1="-8" y1="3" x2="-40" y2="22"/>
        <line x1="8" y1="3" x2="40" y2="22"/>
        <circle cx="-44" cy="-24" r="6" opacity="0.6"/>
        <circle cx="44" cy="-24" r="6" opacity="0.6"/>
        <circle cx="-44" cy="24" r="6" opacity="0.6"/>
        <circle cx="44" cy="24" r="6" opacity="0.6"/>
      </g>
      <text x="20" y="170" font-family="-apple-system, sans-serif" font-size="11" letter-spacing="1.5" fill="#ffffff55">БВС / ДРОНЫ</text>
      <text x="20" y="194" font-family="-apple-system, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Инспекция объектов</text>
      <text x="20" y="218" font-family="-apple-system, sans-serif" font-size="13" fill="#A6FF00">от 3.6 млн ₽</text>
    </g>

    <!-- second row: services / softer cards -->
    <g transform="translate(0, 268)" opacity="0.55">
      <rect width="320" height="120" rx="14" fill="#1A1A1A" stroke="#ffffff10"/>
      <rect x="20" y="20" width="280" height="14" rx="3" fill="#ffffff20"/>
      <rect x="20" y="46" width="180" height="10" rx="3" fill="#ffffff10"/>
      <rect x="20" y="78" width="100" height="22" rx="11" fill="#A6FF00" opacity="0.2"/>
    </g>
    <g transform="translate(346, 268)" opacity="0.55">
      <rect width="320" height="120" rx="14" fill="#1A1A1A" stroke="#ffffff10"/>
      <rect x="20" y="20" width="240" height="14" rx="3" fill="#ffffff20"/>
      <rect x="20" y="46" width="200" height="10" rx="3" fill="#ffffff10"/>
      <rect x="20" y="78" width="100" height="22" rx="11" fill="#A6FF00" opacity="0.2"/>
    </g>
    <g transform="translate(692, 268)" opacity="0.55">
      <rect width="320" height="120" rx="14" fill="#1A1A1A" stroke="#ffffff10"/>
      <rect x="20" y="20" width="220" height="14" rx="3" fill="#ffffff20"/>
      <rect x="20" y="46" width="160" height="10" rx="3" fill="#ffffff10"/>
      <rect x="20" y="78" width="100" height="22" rx="11" fill="#A6FF00" opacity="0.2"/>
    </g>
    <g transform="translate(1038, 268)" opacity="0.55">
      <rect width="320" height="120" rx="14" fill="#1A1A1A" stroke="#ffffff10"/>
      <rect x="20" y="20" width="260" height="14" rx="3" fill="#ffffff20"/>
      <rect x="20" y="46" width="120" height="10" rx="3" fill="#ffffff10"/>
      <rect x="20" y="78" width="100" height="22" rx="11" fill="#A6FF00" opacity="0.2"/>
    </g>
  </g>

  <!-- Footer hint -->
  <text x="120" y="852" font-family="-apple-system, sans-serif" font-size="12" letter-spacing="1.4" fill="#ffffff35">
    КАТАЛОГ С ФИЛЬТРАМИ ПО ОТРАСЛИ, ОПЕРАЦИИ, ПРОИЗВОДИТЕЛЮ — ПРОЕКТ С НУЛЯ, ДИЗАЙН-ВКЛАД НА ЭТАПЕ СЦЕНАРИЯ
  </text>
</svg>
