<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Переговорки — единый интерфейс мультимедии и климат-контроля">
  <rect width="1600" height="900" fill="#0E0E0E"/>

  <!-- ambient texture -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="225" x2="1600" y2="225"/>
    <line x1="0" y1="675" x2="1600" y2="675"/>
  </g>

  <!-- Header -->
  <text x="120" y="120" font-family="-apple-system, sans-serif" font-size="14" letter-spacing="2.6" fill="#ffffff66">ПЕРЕГОВОРКИ — ЕДИНЫЙ ИНТЕРФЕЙС</text>
  <text x="120" y="170" font-family="-apple-system, sans-serif" font-size="36" font-weight="600" fill="#ffffff">Один UI на все офисы ГПН</text>

  <!-- Main panel — рамка планшета -->
  <g transform="translate(420, 240)">
    <rect width="760" height="500" rx="22" fill="#0a0a0a" stroke="#ffffff14" stroke-width="2"/>
    <!-- top status bar -->
    <g transform="translate(0, 18)">
      <text x="34" y="14" font-family="-apple-system, sans-serif" font-size="11" letter-spacing="1.6" fill="#ffffff66">ПЕРЕГОВОРКА «АРКТИКА» · 14:30 → 15:00</text>
      <circle cx="710" cy="9" r="6" fill="#A6FF00"/>
      <text x="688" y="14" font-family="-apple-system, sans-serif" font-size="11" letter-spacing="1.4" fill="#ffffff55" text-anchor="end">СВОБОДНА</text>
    </g>
    <line x1="0" y1="56" x2="760" y2="56" stroke="#ffffff10"/>

    <!-- big control: temp -->
    <g transform="translate(40, 86)">
      <text x="0" y="22" font-family="-apple-system, sans-serif" font-size="11" letter-spacing="1.5" fill="#ffffff55">КЛИМАТ</text>
      <text x="0" y="98" font-family="-apple-system, sans-serif" font-size="86" font-weight="700" fill="#ffffff">22°</text>
      <text x="180" y="98" font-family="-apple-system, sans-serif" font-size="22" fill="#ffffff66">°C</text>
      <!-- minus / plus buttons -->
      <g transform="translate(0, 124)">
        <circle cx="36" cy="36" r="32" fill="#1A1A1A" stroke="#ffffff14"/>
        <line x1="22" y1="36" x2="50" y2="36" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
        <circle cx="116" cy="36" r="32" fill="#A6FF00"/>
        <line x1="102" y1="36" x2="130" y2="36" stroke="#0a0a0a" stroke-width="2.8" stroke-linecap="round"/>
        <line x1="116" y1="22" x2="116" y2="50" stroke="#0a0a0a" stroke-width="2.8" stroke-linecap="round"/>
      </g>
    </g>

    <!-- presentation tile -->
    <g transform="translate(360, 86)">
      <rect width="360" height="230" rx="12" fill="#1A1A1A" stroke="#ffffff14"/>
      <text x="20" y="36" font-family="-apple-system, sans-serif" font-size="11" letter-spacing="1.5" fill="#ffffff55">ВЫВЕСТИ КОНТЕНТ</text>
      <!-- screen frame -->
      <rect x="20" y="60" width="320" height="140" rx="8" fill="#0a0a0a" stroke="#ffffff10"/>
      <!-- play -->
      <g transform="translate(180, 130)">
        <circle r="26" fill="#A6FF00"/>
        <polygon points="-8,-12 14,0 -8,12" fill="#0a0a0a"/>
      </g>
    </g>

    <!-- bottom row: scenarios -->
    <g transform="translate(40, 360)">
      <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="11" letter-spacing="1.5" fill="#ffffff55">СЦЕНАРИИ</text>
      <g transform="translate(0, 18)">
        <rect width="220" height="76" rx="12" fill="#1A1A1A" stroke="#ffffff14"/>
        <text x="20" y="32" font-family="-apple-system, sans-serif" font-size="14" fill="#ffffff">Презентация</text>
        <text x="20" y="56" font-family="-apple-system, sans-serif" font-size="11" letter-spacing="1.2" fill="#ffffff44">КЛИМАТ · ЭКРАН · СВЕТ</text>
      </g>
      <g transform="translate(240, 18)">
        <rect width="220" height="76" rx="12" fill="#1A1A1A" stroke="#A6FF00" stroke-opacity="0.4"/>
        <text x="20" y="32" font-family="-apple-system, sans-serif" font-size="14" fill="#ffffff">Видеозвонок</text>
        <text x="20" y="56" font-family="-apple-system, sans-serif" font-size="11" letter-spacing="1.2" fill="#A6FF00" opacity="0.85">АКТИВЕН</text>
      </g>
      <g transform="translate(480, 18)">
        <rect width="220" height="76" rx="12" fill="#1A1A1A" stroke="#ffffff14"/>
        <text x="20" y="32" font-family="-apple-system, sans-serif" font-size="14" fill="#ffffff">Тихий час</text>
        <text x="20" y="56" font-family="-apple-system, sans-serif" font-size="11" letter-spacing="1.2" fill="#ffffff44">КЛИМАТ · СВЕТ</text>
      </g>
    </g>
  </g>

  <!-- Side hints — список офисов как символ распространения -->
  <g transform="translate(120, 240)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="11" letter-spacing="1.6" fill="#ffffff55">ОФИСЫ</text>
    <g font-family="-apple-system, sans-serif" font-size="14" fill="#ffffff85">
      <text x="0" y="40">Москва · Цифергауз</text>
      <text x="0" y="76">Санкт-Петербург · Зенит-Арена</text>
      <text x="0" y="112">Уфа · НТЦ</text>
      <text x="0" y="148">Тюмень · Геология</text>
      <text x="0" y="184">Омск · Переработка</text>
      <text x="0" y="220" fill="#ffffff44">…+15 офисов</text>
    </g>
  </g>

  <text x="120" y="852" font-family="-apple-system, sans-serif" font-size="12" letter-spacing="1.4" fill="#ffffff35">
    СЦЕНАРНЫЙ АНАЛИЗ → ИССЛЕДОВАНИЕ → ИТЕРАЦИИ → ЕДИНЫЙ UI ДЛЯ КЛИМАТА И МУЛЬТИМЕДИИ
  </text>
</svg>
